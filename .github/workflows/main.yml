name: Multi-Service Secure Deploy

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Select service repo"
        required: true
        type: choice
        options:
          - backend-api
          - chatbot-api
          - demo-setup
          - hub-portal
          - mobile-app
          - Oauth_Module
          - online-banking
          - rpa-backend-server
          - rpa-helix
          - Teller

      commit_hash:
        description: "Approved commit hash"
        required: true

      environment:
        description: "Environment"
        required: true
        default: "staging"

      action:
        description: "deploy / rollback"
        required: true
        default: "deploy"

env:
  WORKSPACE: "your-bitbucket-workspace"

jobs:

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify hash from Bitbucket
        env:
          TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          REPO=${{ github.event.inputs.repo_name }}
          HASH=${{ github.event.inputs.commit_hash }}

          RESPONSE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/$WORKSPACE/$REPO/pullrequests?state=MERGED&sort=-updated_on")

          MERGES=$(echo "$RESPONSE" | jq -r '.values[:3] | .[].merge_commit.hash')

          if echo "$MERGES" | grep -q "$HASH"; then
            echo "Valid hash"
          else
            echo "Invalid hash"
            exit 1
          fi

  checkout:
    needs: verify
    runs-on: self-hosted
    steps:
      - name: Clone Bitbucket repo dynamically
        env:
          TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          REPO=${{ github.event.inputs.repo_name }}
          HASH=${{ github.event.inputs.commit_hash }}

          git clone https://x-token-auth:$TOKEN@bitbucket.org/$WORKSPACE/$REPO.git
          cd $REPO
          git checkout $HASH

  test-scan:
    needs: checkout
    runs-on: self-hosted
    steps:
      - name: Run Tests
        run: |
          cd ${{ github.event.inputs.repo_name }}
          npm install
          npm test || true

      - name: SCA
        run: |
          npm audit --audit-level=high || true

      - name: Sonar Scan
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${{ github.event.inputs.repo_name }}

  deploy:
    if: github.event.inputs.action == 'deploy'
    needs: test-scan
    runs-on: self-hosted
    steps:
      - name: Deploy Service
        run: |
          SERVICE=${{ github.event.inputs.repo_name }}
          HASH=${{ github.event.inputs.commit_hash }}

          BASE=/opt/apps/$SERVICE
          RELEASE=$BASE/releases/$HASH

          mkdir -p $RELEASE
          cp -r $SERVICE/* $RELEASE/

          ln -sfn $RELEASE $BASE/current

  rollback:
    if: github.event.inputs.action == 'rollback'
    runs-on: self-hosted
    steps:
      - name: Rollback Service
        run: |
          SERVICE=${{ github.event.inputs.repo_name }}
          BASE=/opt/apps/$SERVICE

          PREV=$(ls -t $BASE/releases | sed -n '2p')

          ln -sfn $BASE/releases/$PREV $BASE/current

  notify:
    needs: [deploy, rollback]
    runs-on: ubuntu-latest
    steps:
      - name: Slack Notify
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"${{ github.event.inputs.repo_name }} deployed (${{
            github.event.inputs.commit_hash }})\"
          }" \
          ${{ secrets.SLACK_WEBHOOK }}
