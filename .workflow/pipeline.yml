name: Secure Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: "Approved Bitbucket merge commit hash"
        required: true
      environment:
        description: "Target environment (dev/staging/prod)"
        required: true
        default: "staging"
      action:
        description: "deploy or rollback"
        required: true
        default: "deploy"

jobs:

  verify-hash:
    name: Verify Bitbucket Approval
    runs-on: ubuntu-latest

    steps:
      - name: Validate commit hash from Bitbucket
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          REPO: "<workspace>/<repo>"
          HASH: ${{ github.event.inputs.commit_hash }}
        run: |
          echo "Validating hash: $HASH"

          # Get last 3 merged PR commits
          RESPONSE=$(curl -s -H "Authorization: Bearer $BITBUCKET_TOKEN" \
            "https://api.bitbucket.org/2.0/repositories/$REPO/pullrequests?state=MERGED&sort=-updated_on")

          # Extract last 3 merge commit hashes
          MERGES=$(echo "$RESPONSE" | jq -r '.values[:3] | .[].merge_commit.hash')

          echo "Recent merges:"
          echo "$MERGES"

          if echo "$MERGES" | grep -q "$HASH"; then
            echo "Hash is valid and recent"
          else
            echo "Invalid or too old hash"
            exit 1
          fi

  build-test-scan:
    name: Tests + Security Checks
    needs: verify-hash
    runs-on: self-hosted

    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash }}

      - name: Install dependencies
        run: npm install

      - name: Run Tests (Backend + Angular)
        run: |
          npm test

      - name: SCA - Dependency Scan
        run: |
          npm audit --audit-level=high || true

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=my-project \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=$SONAR_TOKEN

      - name: Sonar Quality Gate Check
        run: |
          sleep 10

  deploy:
    name: Deploy Application
    needs: build-test-scan
    if: github.event.inputs.action == 'deploy'
    runs-on: self-hosted

    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_hash }}

      - name: Build app
        run: |
          npm run build

      - name: Deploy using symlink swap
        run: |
          APP_DIR=/var/www/app
          RELEASE_DIR=$APP_DIR/releases/${{ github.event.inputs.commit_hash }}

          mkdir -p $RELEASE_DIR
          cp -r * $RELEASE_DIR/

          ln -sfn $RELEASE_DIR $APP_DIR/current

      - name: Save deployment history
        run: |
          echo "${{ github.event.inputs.commit_hash }}" >> /var/www/app/deploy.log

  rollback:
    name: Rollback Deployment
    if: github.event.inputs.action == 'rollback'
    runs-on: self-hosted

    steps:
      - name: Get previous commit
        id: prev
        run: |
          PREV=$(tail -n 2 /var/www/app/deploy.log | head -n 1)
          echo "previous=$PREV" >> $GITHUB_OUTPUT

      - name: Rollback via symlink
        run: |
          APP_DIR=/var/www/app
          PREV=${{ steps.prev.outputs.previous }}

          ln -sfn $APP_DIR/releases/$PREV $APP_DIR/current

  notify:
    name: Slack Notification
    needs: [deploy, rollback]
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"Deployment *${{ github.event.inputs.action }}* completed for commit *${{ github.event.inputs.commit_hash }}* in *${{ github.event.inputs.environment }}*\"
          }" \
          ${{ secrets.SLACK_WEBHOOK }}
